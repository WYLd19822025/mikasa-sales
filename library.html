<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikasa Ventures — Off-The-Shelf Library</title>
<meta name="description" content="113 episodes across 10 series — ready-to-deploy learning content from Mikasa Ventures.">
<meta property="og:title" content="Mikasa Ventures — Off-The-Shelf Library">
<meta property="og:description" content="113 episodes · 10 series · 29h 23m of ready-to-deploy learning content.">
<style>
  :root {
    --bg-panel: #1A1A1A;
    --bg-card: #1F1F1F;
    --bg-card-hover: #232323;
    --bg-input: #0E0E0E;
    --text: #F5F5F5;
    --text-muted: #A8A8A8;
    --text-dim: #7A7A7A;
    --accent: #E63946;
    --accent-hover: #D02836;
    --accent-soft: rgba(230, 57, 70, 0.12);
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.14);
    --radius-sm: 6px;
    --radius-md: 10px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #000;
    font-family: var(--font-sans);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1rem 3rem;
  }
  .panel {
    background: var(--bg-panel);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  /* ----- Back-to-card button (shown only when arriving from pitch card) ----- */
  .back-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: rgba(230, 57, 70, 0.06);
    border-bottom: 1px solid rgba(230, 57, 70, 0.2);
    font-size: 12px;
  }
  .back-bar.show { display: flex; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    font-size: 12.5px;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong);
    transition: background 0.15s ease;
  }
  .back-link:hover { background: rgba(255, 255, 255, 0.04); }
  .back-context {
    color: var(--text-muted);
    font-size: 11.5px;
  }
  .back-context .for-name { color: var(--text); font-weight: 600; }
  .back-close {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--border);
    color: var(--text);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-family: inherit;
    font-size: 17px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: background 0.15s ease;
  }
  .back-close:hover { background: rgba(255, 255, 255, 0.14); }

  /* ----- Header (same as Humanexity-style) ----- */
  .panel-header {
    background: #0A0A0A;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-text {
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.04em; line-height: 1.1;
  }
  .brand-text .accent { color: var(--accent); }
  .brand-tag {
    font-size: 9px; letter-spacing: 0.15em;
    color: var(--text-dim); margin-top: 2px;
  }
  .divider-v { width: 1px; height: 40px; background: var(--border); }
  .header-title {
    font-size: 18px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    margin: 0 0 4px;
  }
  .header-meta {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px;
  }
  .header-meta .count { color: var(--accent); font-weight: 500; }
  .header-meta .sep { color: var(--text-dim); }
  .header-meta .label { color: var(--text-muted); }
  .header-stats {
    margin-left: auto;
    display: flex; gap: 1.5rem; align-items: center;
  }
  .stat { text-align: right; }
  .stat-num { font-size: 20px; font-weight: 700; line-height: 1; }
  .stat-lbl {
    font-size: 10px; letter-spacing: 0.15em;
    color: var(--text-dim); text-transform: uppercase;
    margin-top: 4px;
  }

  /* ----- Grid body ----- */
  .panel-body { padding: 1.5rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 1rem;
  }
  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
  @media (max-width: 820px)  { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  @media (max-width: 520px)  { .grid { grid-template-columns: 1fr; } }

  /* ----- Series box ----- */
  .box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0;
    transition: border-color 0.15s ease;
    overflow: hidden;
  }
  .box:hover { border-color: var(--border-strong); }
  .box-banner {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #0A0A0A;
    overflow: hidden;
    position: relative;
  }
  .box-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .box-content {
    padding: 0.875rem 1rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.625rem;
  }
  .box-meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    margin-bottom: 0.125rem;
  }
  .box-meta-row .ep-count { color: var(--accent); font-weight: 600; }
  .box-meta-row .runtime { color: var(--text-dim); }

  /* ----- Dropdown ----- */
  .ep-select {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 9px 10px;
    font-size: 12.5px;
    font-family: inherit;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23A8A8A8' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 28px;
  }
  .ep-select:focus { outline: none; border-color: var(--accent); }
  .ep-select option { background: var(--bg-input); color: var(--text); }

  /* ----- Summary + trailer trigger ----- */
  .ep-detail {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    display: none;
  }
  .ep-detail.show { display: block; }
  .ep-summary {
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-muted);
    margin: 0 0 10px;
  }
  .ep-actions { display: flex; align-items: center; gap: 8px; }
  .play-btn {
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 7px 12px;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .play-btn:hover {
    background: var(--accent);
    color: #FFF;
  }
  .ep-duration {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  /* ----- Inline trailer player (mobile only — desktop uses modal) ----- */
  .trailer-frame {
    display: none;
    margin-top: 10px;
  }
  .trailer-frame.open { display: block; }
  .trailer-inner {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .trailer-inner iframe { width: 100%; height: 100%; border: 0; }
  .trailer-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .trailer-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.08em;
  }
  .trailer-close:hover { color: var(--text); border-color: var(--text-muted); }

  /* ----- Modal overlay (desktop) ----- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 2rem;
    animation: fade-in 0.2s ease;
  }
  .modal-backdrop.open { display: flex; }
  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .modal-shell {
    width: min(960px, 100%);
    max-height: 90vh;
    background: var(--bg-panel);
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--border-strong);
    display: flex;
    flex-direction: column;
    animation: slide-up 0.25s ease;
  }
  @keyframes slide-up {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: #0A0A0A;
  }
  .modal-title-wrap { min-width: 0; flex: 1; }
  .modal-eyebrow {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .modal-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .modal-close {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-family: inherit;
    font-size: 18px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-left: 12px;
    transition: background 0.15s ease;
  }
  .modal-close:hover { background: rgba(255, 255, 255, 0.16); }
  .modal-video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
  }
  .modal-video-wrap iframe {
    width: 100%;
    height: 100%;
    border: 0;
  }
  .modal-summary {
    padding: 14px 18px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    border-top: 1px solid var(--border);
  }

  /* On mobile, fall back to inline expansion — hide the modal even if triggered */
  @media (max-width: 720px) {
    .modal-backdrop.open { display: none; }
  }

  /* ----- Footer CTA ----- */
  .cta-block {
    text-align: center;
    padding: 1.75rem 1rem 0.5rem;
  }
  .cta-caption {
    font-size: 13px;
    color: var(--text-muted);
    margin: 0 0 12px;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #FFF;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 14px 28px;
    border-radius: var(--radius-sm);
    transition: background 0.15s ease;
  }
  .cta-btn:hover { background: var(--accent-hover); }

  @media (max-width: 720px) {
    .panel-header { flex-wrap: wrap; padding: 1rem; gap: 0.75rem; }
    .divider-v { display: none; }
    .header-stats {
      width: 100%;
      margin-left: 0;
      justify-content: space-between;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .stat { text-align: left; }
    .header-title { font-size: 15px; }
    .panel-body { padding: 1rem; }
  }
</style>
</head>

  { title: "Self Improvement Series", count: 21, runtime: "5h 42m", eyebrow: "SERIES 10", episodes: [["Action Planning","15 min"],["Assertiveness: Key to Effective Communication","15 min"],["Being Proactive","15 min"],["Building Resilience","15 min"],["Circle of Influence","15 min"],["Critical Thinking Skills","30 min"],["Cultivating A Positive Attitude","15 min"],["Dealing With High Pressure Situation At Work","15 min"],["Effective Networking","25 min"],["Finding Balance: Art of Work Life Harmony","15 min"],["Growth Mindset","20 min"],["How To Set SMART KRAs For Yourself At Work","15 min"],["Increasing Your Emotional Intelligence","15 min"],["Johari Window","15 min"],["Logical Thinking","15 min"],["Mastering Remote Working","15 min"],["Meeting 101: Unleashing Productivity & Collaboration","12 min"],["Stress Management","15 min"],["Time Management","15 min"],["Why and How to Stop Multi-Tasking","15 min"],["Cultural Sensitivity for Expats","15 min"]] }
];

// =============================================================
// RENDER
// =============================================================
const grid = document.getElementById("grid");

// Modal references (used on desktop)
const modalBackdrop = document.getElementById("modalBackdrop");
const modalEyebrow = document.getElementById("modalEyebrow");
const modalTitle = document.getElementById("modalTitle");
const modalVideoWrap = document.getElementById("modalVideoWrap");
const modalSummary = document.getElementById("modalSummary");
const modalCloseBtn = document.getElementById("modalClose");

const MOBILE_BREAKPOINT = 720;
const isMobile = () => window.innerWidth <= MOBILE_BREAKPOINT;

function openModal({ seriesName, title, fileId, summary }) {
  modalEyebrow.textContent = seriesName;
  modalTitle.textContent = title;
  modalSummary.textContent = summary || "";

  const iframe = document.createElement("iframe");
  iframe.src = `https://drive.google.com/file/d/${fileId}/preview`;
  iframe.setAttribute("allow", "autoplay; encrypted-media");
  iframe.setAttribute("allowfullscreen", "");
  iframe.title = `${title} trailer`;

  modalVideoWrap.innerHTML = "";
  modalVideoWrap.appendChild(iframe);

  modalBackdrop.classList.add("open");
  modalBackdrop.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  modalBackdrop.classList.remove("open");
  modalBackdrop.setAttribute("aria-hidden", "true");
  modalVideoWrap.innerHTML = "";
  document.body.style.overflow = "";
}

modalCloseBtn.addEventListener("click", closeModal);
modalBackdrop.addEventListener("click", (e) => {
  if (e.target === modalBackdrop) closeModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && modalBackdrop.classList.contains("open")) closeModal();
});

// Diagnostic counter — count how many episodes have a working trailer mapped
let trailerHitCount = 0;
let trailerMissCount = 0;
const missingTrailers = [];

data.forEach((s, seriesIdx) => {
  const num = String(seriesIdx + 1).padStart(2, "0");
  const box = document.createElement("div");
  box.className = "box";

  // Build the static box scaffold (no episode data inside innerHTML)
  box.innerHTML = `
    <div class="box-banner">
      <img alt="" loading="lazy">
    </div>
    <div class="box-content">
      <div class="box-meta-row">
        <span class="ep-count"></span>
        <span class="runtime"></span>
      </div>
      <select class="ep-select">
        <option value="">— Select an episode —</option>
      </select>
      <div class="ep-detail">
        <p class="ep-summary"></p>
        <div class="ep-actions">
          <button class="play-btn" type="button">
            <svg width="9" height="9" viewBox="0 0 8 8" fill="currentColor"><path d="M1 0L7 4L1 8Z"/></svg>
            Play trailer
          </button>
          <span class="ep-duration"></span>
        </div>
        <div class="trailer-frame">
          <div class="trailer-inner"></div>
          <div class="trailer-bar">
            <span>Trailer preview</span>
            <button class="trailer-close" type="button">Close</button>
          </div>
        </div>
      </div>
    </div>
  `;

  // Set banner image and meta text
  const bannerImg = box.querySelector(".box-banner img");
  if (seriesImages && seriesImages[seriesIdx]) {
    bannerImg.src = seriesImages[seriesIdx];
    bannerImg.alt = s.title;
  }
  box.querySelector(".ep-count").textContent = `${s.count} episodes`;
  box.querySelector(".runtime").textContent = s.runtime;

  const select = box.querySelector(".ep-select");
  const detail = box.querySelector(".ep-detail");
  const summary = box.querySelector(".ep-summary");
  const playBtn = box.querySelector(".play-btn");
  const durationLbl = box.querySelector(".ep-duration");
  const trailerFrame = box.querySelector(".trailer-frame");
  const trailerInner = box.querySelector(".trailer-inner");
  const trailerClose = box.querySelector(".trailer-close");

  // Build options via DOM API — the value is the episode INDEX, not the title.
  // This avoids all HTML-entity round-trip bugs with & " ' : etc.
  s.episodes.forEach(([title, dur], epIdx) => {
    const opt = document.createElement("option");
    opt.value = String(epIdx);
    opt.textContent = title;
    select.appendChild(opt);

    if (trailerMap[title]) {
      trailerHitCount++;
    } else {
      trailerMissCount++;
      missingTrailers.push(title);
    }
  });

  select.addEventListener("change", () => {
    trailerFrame.classList.remove("open");
    trailerInner.innerHTML = "";

    const idx = select.value;
    if (idx === "") {
      detail.classList.remove("show");
      return;
    }
    const [title, dur] = s.episodes[parseInt(idx, 10)];
    summary.textContent = summaries[title] || "Module summary coming soon.";
    durationLbl.textContent = dur;
    const fileId = trailerMap[title];
    playBtn.style.display = fileId ? "inline-flex" : "none";
    detail.classList.add("show");
    playBtn.dataset.fileId = fileId || "";
    playBtn.dataset.title = title;
  });

  playBtn.addEventListener("click", () => {
    const fileId = playBtn.dataset.fileId;
    const title = playBtn.dataset.title;
    if (!fileId) {
      console.warn(`No trailer fileId found for: ${title}`);
      return;
    }

    if (isMobile()) {
      // Mobile: inline expansion within the box
      const iframe = document.createElement("iframe");
      iframe.src = `https://drive.google.com/file/d/${fileId}/preview`;
      iframe.setAttribute("allow", "autoplay; encrypted-media");
      iframe.setAttribute("allowfullscreen", "");
      iframe.title = `${title} trailer`;
      trailerInner.innerHTML = "";
      trailerInner.appendChild(iframe);
      trailerFrame.classList.add("open");
    } else {
      // Desktop: open in shared modal
      openModal({
        seriesName: s.title,
        title: title,
        fileId: fileId,
        summary: summaries[title] || ""
      });
    }
  });

  trailerClose.addEventListener("click", () => {
    trailerFrame.classList.remove("open");
    trailerInner.innerHTML = "";
  });

  grid.appendChild(box);
});

// Print diagnostic summary to browser console
console.log(`[Mikasa Library] Trailers mapped: ${trailerHitCount} / ${trailerHitCount + trailerMissCount}`);
if (missingTrailers.length > 0) {
  console.warn("[Mikasa Library] Episodes WITHOUT a trailer mapped:", missingTrailers);
}

// ---- Back-to-card navigation ----
// If the visitor arrived from a personalized pitch card (with ?from=card and
// other params), show a back bar that returns them to that card.
(function setupBackBar() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("from") !== "card") return;

  const backBar = document.getElementById("backBar");
  const backLink = document.getElementById("backLink");
  const backClose = document.getElementById("backClose");
  const backContext = document.getElementById("backContext");
  if (!backBar || !backLink) return;

  // Build the URL back to the pitch card, preserving all relevant params
  // The pitch card lives at the same origin, at "/" (where index.html is)
  const cardParams = new URLSearchParams();
  ["name", "role", "company", "context", "sender", "phone"].forEach(k => {
    if (params.has(k)) cardParams.set(k, params.get(k));
  });
  // Build absolute URL to root (where the pitch card lives)
  const origin = window.location.origin;
  const cardUrl = `${origin}/${cardParams.toString() ? "?" + cardParams.toString() : ""}`;

  backLink.href = cardUrl;
  backClose.href = cardUrl;

  // Show recipient context
  const name = params.get("name");
  if (name) {
    backContext.innerHTML = `Browsing for <span class="for-name">${name}</span>`;
  }

  backBar.classList.add("show");

  // Browser-native back also works since this is a real navigation
  // and we set target="" (same tab) on the pitch card link
})();
</script>
